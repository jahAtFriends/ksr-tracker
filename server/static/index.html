<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KSR 2026 Vehicle Tracker</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
  <div class="page container py-3 py-lg-4">
    <header class="app-header card shadow-sm border-0 mb-3">
      <div class="card-body d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3">
        <div>
          <h1 class="h3 mb-1">Friends School Kinetic Tracker</h1>
          <p class="mb-0">2026 Baltimore Kinetic Sculpture Race</p>
        </div>
        <div class="d-flex align-items-center gap-2">
          <a class="btn btn-outline-dark btn-sm" href="/admin">Admin</a>
          <span id="connection-pill" class="badge rounded-pill text-bg-secondary">Disconnected</span>
        </div>
      </div>
    </header>

    <main class="row g-3 align-items-stretch flex-grow-1">
      <section class="col-12 col-lg-8">
        <div class="card shadow-sm h-100 border-0">
          <div class="card-body p-0">
            <div id="map"></div>
          </div>
        </div>
      </section>
      <aside class="col-12 col-lg-4">
        <div class="card shadow-sm h-100 border-0">
          <div class="card-body d-flex flex-column">
            <h2 class="h5 mb-3">Active Trackers</h2>
            <div id="device-list" class="device-list"></div>
          </div>
        </div>
      </aside>
    </main>

    <footer class="site-footer mt-3 small">
      <p class="mb-0">Copyright &copy; 2026 Friends School of Baltimore. Site created by the Friends School of Baltimore Department of Computer Science.</p>
    </footer>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="/static/js/map.js"></script>
</body>
</html>
