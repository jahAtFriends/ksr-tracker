<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KSR 2026 Vehicle Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <div>
        <h1>Friends School Kinetic Tracker</h1>
        <p>2026 Baltimore Kinetic Sculpture Race</p>
      </div>
      <div id="connection-pill" class="pill stale">Disconnected</div>
    </header>

    <main class="layout">
      <section class="map-wrap">
        <div id="map"></div>
      </section>
      <aside class="panel">
        <h2>Live Status</h2>
        <dl>
          <div>
            <dt>Last Timestamp (UTC)</dt>
            <dd id="last-ts">-</dd>
          </div>
          <div>
            <dt>Latitude</dt>
            <dd id="lat">-</dd>
          </div>
          <div>
            <dt>Longitude</dt>
            <dd id="lng">-</dd>
          </div>
          <div>
            <dt>Speed (km/h)</dt>
            <dd id="speed">-</dd>
          </div>
          <div>
            <dt>Route Complete</dt>
            <dd id="progress">-</dd>
          </div>
        </dl>
      </aside>
    </main>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="/static/js/map.js"></script>
</body>
</html>
